version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mission_control}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - coolify

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - coolify

  backend:
    build:
      # Build from repo root so the backend image can include repo-level assets
      # like `backend/templates/`.
      context: .
      dockerfile: backend/Dockerfile
    environment:
      # Override localhost defaults for container networking
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-mission_control}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://agents.exerun.com}
      BASE_URL: ${BASE_URL:-https://agents.exerun.com}
      DB_AUTO_MIGRATE: ${DB_AUTO_MIGRATE:-true}
      AUTH_MODE: ${AUTH_MODE:-local}
      LOCAL_AUTH_TOKEN: ${LOCAL_AUTH_TOKEN:-dy420682mj4XV74EKawaJUp4AEXJtFN8Aj8SMLbLXaRJiApNZBdbRz6gXqYHEmb5z-U}
      RQ_REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    networks:
      - coolify
    labels:
      traefik.enable: "true"
      traefik.http.routers.mission-control-api.rule: "Host(`agents.exerun.com`) && PathPrefix(`/api`)"
      traefik.http.routers.mission-control-api.entrypoints: websecure
      traefik.http.routers.mission-control-api.tls: "true"
      traefik.http.routers.mission-control-api.priority: "20"
      traefik.http.services.mission-control-api.loadbalancer.server.port: "8000"
      traefik.http.middlewares.mission-control-api-strip.stripprefix.prefixes: "/api"
      traefik.http.routers.mission-control-api.middlewares: "mission-control-api-strip"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
        NEXT_PUBLIC_AUTH_MODE: ${AUTH_MODE}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
      NEXT_PUBLIC_AUTH_MODE: ${AUTH_MODE}
    depends_on:
      - backend
    expose:
      - "3000"
    networks:
      - coolify
    labels:
      traefik.enable: "true"
      traefik.http.routers.mission-control-frontend.rule: "Host(`agents.exerun.com`) && !PathPrefix(`/api`)"
      traefik.http.routers.mission-control-frontend.entrypoints: websecure
      traefik.http.routers.mission-control-frontend.tls: "true"
      traefik.http.routers.mission-control-frontend.priority: "10"
      traefik.http.services.mission-control-frontend.loadbalancer.server.port: "3000"

  webhook-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["python", "scripts/rq-docker", "worker"]
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-mission_control}
      AUTH_MODE: ${AUTH_MODE:-local}
      LOCAL_AUTH_TOKEN: ${LOCAL_AUTH_TOKEN:-dy420682mj4XV74EKawaJUp4AEXJtFN8Aj8SMLbLXaRJiApNZBdbRz6gXqYHEmb5z-U}
      RQ_REDIS_URL: redis://redis:6379/0
      RQ_QUEUE_NAME: ${RQ_QUEUE_NAME:-default}
      RQ_DISPATCH_THROTTLE_SECONDS: ${RQ_DISPATCH_THROTTLE_SECONDS:-2.0}
      RQ_DISPATCH_MAX_RETRIES: ${RQ_DISPATCH_MAX_RETRIES:-3}
    restart: unless-stopped
    networks:
      - coolify

volumes:
  postgres_data:

networks:
  coolify:
    external: true
    name: coolify
